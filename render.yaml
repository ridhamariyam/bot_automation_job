services:
  # ── API + ARQ Worker (combined) ────────────────────────────────────────────
  # Pre-built image from Docker Hub — no pipeline minutes consumed.
  # Runs both: uvicorn (FastAPI) + arq worker (Playwright bot) in one container.
  # To redeploy: ./docker-push.sh  →  Manual Deploy in Render dashboard
  - type: web
    name: jobrocket-api
    image:
      url: docker.io/ridhamaryam/jobrocket-backend:latest
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobrocket-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: jobrocket-redis
          type: redis
          property: externalConnectionString
      # Auth
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      # SMTP
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ridhamariyam44@gmail.com
      - key: SMTP_PASS
        sync: false
      # Paddle
      - key: PADDLE_SANDBOX
        value: "false"
      - key: PADDLE_API_KEY
        sync: false
      - key: PADDLE_WEBHOOK_SECRET
        sync: false
      - key: PADDLE_PRICE_PRO
        value: pri_01knn4f6079a1nvpzzmf0g686m
      - key: PADDLE_PRICE_PREMIUM
        value: pri_01knn4g3kd8nzzqz6f66vvahtc
      # URLs
      - key: FRONTEND_URL
        value: https://jobrocket.aiviora.online
      - key: RESET_BASE_URL
        value: https://jobrocket.aiviora.online
      - key: EXTRA_CORS_ORIGINS
        sync: false
      # AI
      - key: OPENAI_API_KEY
        sync: false
      # Twilio WhatsApp
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        value: "whatsapp:+14155238886"

databases:
  - name: jobrocket-db
    plan: free
    region: oregon

redis:
  - name: jobrocket-redis
    plan: free
    region: oregon
