services:
  # ── API / Web ──────────────────────────────────────────────────────────────
  - type: web
    name: jobrocket-backend
    runtime: python
    rootDir: backend
    # playwright --with-deps installs libpango, libcairo, libfontconfig — WeasyPrint uses these too
    buildCommand: pip install --prefer-binary -r requirements.txt && playwright install chromium --with-deps
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobrocket-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: jobrocket-redis
          type: redis
          property: connectionString
      # Auth
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      # SMTP
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ridhamariyaam@gmail.com
      - key: SMTP_PASS
        sync: false
      # Paddle
      - key: PADDLE_SANDBOX
        value: "false"
      - key: PADDLE_API_KEY
        sync: false
      - key: PADDLE_WEBHOOK_SECRET
        sync: false
      - key: PADDLE_PRICE_PRO
        value: pri_01knn4f6079a1nvpzzmf0g686m
      - key: PADDLE_PRICE_PREMIUM
        value: pri_01knn4g3kd8nzzqz6f66vvahtc
      # URLs
      - key: FRONTEND_URL
        value: https://jobrocket.aiviora.online
      - key: EXTRA_CORS_ORIGINS
        sync: false
      # AI
      - key: OPENAI_API_KEY
        sync: false
      # Twilio WhatsApp
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        value: "whatsapp:+14155238886"   # Twilio sandbox default; change in prod

  # ── ARQ Bot Worker ─────────────────────────────────────────────────────────
  - type: worker
    name: jobrocket-bot-worker
    runtime: python
    rootDir: .
    buildCommand: pip install --prefer-binary -r backend/requirements.txt && playwright install chromium --with-deps
    startCommand: cd backend && python -m arq workers.bot_worker.WorkerSettings
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobrocket-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: jobrocket-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        fromService:
          name: jobrocket-backend
          type: web
          envVarKey: JWT_SECRET
      - key: ENCRYPTION_KEY
        fromService:
          name: jobrocket-backend
          type: web
          envVarKey: ENCRYPTION_KEY
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ridhamariyaam@gmail.com
      - key: SMTP_PASS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        value: "whatsapp:+14155238886"
      - key: BOT_API_URL
        value: https://jobrocket-backend.onrender.com

