services:
  # ── JobRocket API + ARQ Bot Worker ─────────────────────────────────────────
  # Builds directly from GitHub using the root Dockerfile (no Docker Hub push needed).
  # One container runs both: uvicorn (FastAPI on PORT=10000) + arq worker (Playwright bot).
  - type: web
    name: jobrocket-api-new
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      # ── Database ────────────────────────────────────────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: jobrocket-db-new
          property: connectionString

      # ── Redis (ARQ job queue) ───────────────────────────────────────────────
      - key: REDIS_URL
        fromService:
          name: jobrocket-redis-new
          type: redis
          property: internalConnectionString

      # ── Auth ────────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true

      # ── SMTP (Gmail app password) ───────────────────────────────────────────
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ridhamariyam44@gmail.com
      - key: SMTP_PASS
        sync: false   # set manually in Render dashboard

      # ── Paddle Billing ──────────────────────────────────────────────────────
      - key: PADDLE_SANDBOX
        value: "false"
      - key: PADDLE_API_KEY
        sync: false
      - key: PADDLE_WEBHOOK_SECRET
        sync: false
      - key: PADDLE_PRICE_PRO
        value: pri_01knn4f6079a1nvpzzmf0g686m
      - key: PADDLE_PRICE_PREMIUM
        value: pri_01knn4g3kd8nzzqz6f66vvahtc

      # ── Frontend / CORS ─────────────────────────────────────────────────────
      - key: FRONTEND_URL
        value: https://jobrocket.aiviora.online
      - key: RESET_BASE_URL
        value: https://jobrocket.aiviora.online
      - key: EXTRA_CORS_ORIGINS
        sync: false   # optional: comma-separated extra Vercel preview URLs

      # ── OpenAI ──────────────────────────────────────────────────────────────
      - key: OPENAI_API_KEY
        sync: false

      # ── Twilio WhatsApp ──────────────────────────────────────────────────────
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        value: "whatsapp:+14155238886"

      # ── Runtime ─────────────────────────────────────────────────────────────
      - key: ENV
        value: production
      - key: PORT
        value: "10000"
      - key: BOT_DISABLED
        value: "false"
      - key: ADMIN_API_KEY
        sync: false

      # ── Migration ────────────────────────────────────────────────────────────
      - key: MIGRATION_API_KEY
        generateValue: true

databases:
  - name: jobrocket-db-new
    plan: free
    region: oregon

redis:
  - name: jobrocket-redis-new
    plan: free
    region: oregon
